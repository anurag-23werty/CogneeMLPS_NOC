services:
  - type: web
    name: noc-copilot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.3

      # ---------- LLM ----------
      - key: LLM_PROVIDER
        value: custom
      - key: LLM_MODEL
        value: mistral/open-mistral-7b
      - key: LLM_API_KEY
        sync: false

      # ---------- Embeddings ----------
      - key: EMBEDDING_PROVIDER
        value: custom
      - key: EMBEDDING_MODEL
        value: huggingface/BAAI/bge-large-en-v1.5
      - key: EMBEDDING_API_KEY
        sync: false
      - key: EMBEDDING_ENDPOINT
        sync: false

      # ---------- Vector storage: PGVector (Neon) ----------
      - key: VECTOR_DB_PROVIDER
        value: pgvector
      - key: VECTOR_DATASET_TO_DATABASE_HANDLER
        value: pgvector
      - key: VECTOR_DB_HOST
        sync: false
      - key: VECTOR_DB_PORT
        sync: false
      - key: VECTOR_DB_NAME
        sync: false
      - key: VECTOR_DB_USERNAME
        sync: false
      - key: VECTOR_DB_PASSWORD
        sync: false
      - key: VECTOR_DB_URL
        sync: false

      # ---------- Graph storage: Neo4j Aura ----------
      - key: GRAPH_DATABASE_PROVIDER
        value: neo4j
      - key: GRAPH_DATABASE_URL
        sync: false
      - key: GRAPH_DATABASE_NAME
        sync: false
      - key: GRAPH_DATABASE_USERNAME
        sync: false
      - key: GRAPH_DATABASE_PASSWORD
        sync: false

      # ---------- Relational DB: Cognee's own metadata store (Neon) ----------
      - key: DB_PROVIDER
        value: postgres
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        sync: false
      - key: DB_NAME
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false

      # ---------- Cognee behavior ----------
      - key: COGNEE_DATASET
        value: noc_incidents
      - key: ENABLE_BACKEND_ACCESS_CONTROL
        value: "false"
