services:
  - type: web
    name: noc-copilot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.3
      - key: LLM_PROVIDER
        value: litellm
      - key: LLM_MODEL
        value: mistral/mistral-large-latest
      - key: LLM_API_KEY
        sync: false
      - key: EMBEDDING_PROVIDER
        value: custom
      - key: EMBEDDING_MODEL
        value: huggingface/BAAI/bge-large-en-v1.5
      - key: EMBEDDING_API_KEY
        sync: false
      - key: EMBEDDING_DIMENSIONS
        value: "1024"
      - key: VECTOR_DB_HOST
        sync: false
      - key: VECTOR_DB_PORT
        value: "5432"
      - key: VECTOR_DB_NAME
        sync: false
      - key: VECTOR_DB_USERNAME
        sync: false
      - key: VECTOR_DB_PASSWORD
        sync: false
      - key: GRAPH_DATABASE_URL
        sync: false
      - key: GRAPH_DATABASE_NAME
        sync: false
      - key: GRAPH_DATABASE_USERNAME
        sync: false
      - key: GRAPH_DATABASE_PASSWORD
        sync: false
      - key: COGNEE_DATASET
        value: noc_incidents
      - key: ENABLE_BACKEND_ACCESS_CONTROL
        value: "false"
